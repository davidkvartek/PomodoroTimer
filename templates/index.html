<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Focus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Focus Timer</h1>
        </header>

        <main>
            <div class="timer-display">
                <svg class="progress-ring" width="300" height="300">
                    <circle class="progress-ring__circle" stroke="white" stroke-width="8" fill="transparent" r="140"
                        cx="150" cy="150" />
                </svg>
                <div class="time-text" id="time-display">25:00</div>
            </div>

            <div class="controls">
                <button id="start-btn" class="btn primary">Start</button>
                <button id="reset-btn" class="btn secondary">Reset</button>
            </div>

            <div class="settings">
                <div class="setting-item">
                    <label for="duration-input">Duration (min)</label>
                    <input type="number" id="duration-input" value="25" min="1" max="180">
                </div>
                <div class="setting-item">
                    <label for="sound-select">Ambient Sound</label>
                    <select id="sound-select">
                        <option value="off">Off</option>
                        <option value="rain">Rain</option>
                        <option value="white">White Noise</option>
                        <option value="pink">Pink Noise</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="volume-input">Volume</label>
                    <input type="range" id="volume-input" min="0" max="1" step="0.01" value="0.3">
                </div>
                <div class="setting-item">
                    <label>Notifications</label>
                    <label class="switch">
                        <input type="checkbox" id="notification-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='audio_engine.js') }}"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
